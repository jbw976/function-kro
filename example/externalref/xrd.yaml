apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: networkingstacks.externalref.example.crossplane.io
spec:
  group: externalref.example.crossplane.io
  names:
    kind: NetworkingStack
    plural: networkingstacks
  scope: Namespaced
  versions:
  - name: v1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              configMapName:
                type: string
                description: Name of the ConfigMap containing platform configuration
          status:
            type: object
            properties:
              networkingInfo:
                type: object
                properties:
                  vpcID:
                    type: string
                  subnetID:
                    type: string
                  securityGroupID:
                    type: string
              platformConfig:
                type: object
                description: Configuration read from the external ConfigMap
                properties:
                  region:
                    type: string
                  environment:
                    type: string
                  vpcCidr:
                    type: string
