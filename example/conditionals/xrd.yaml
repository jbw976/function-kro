apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: networkingstacks.conditionals.example.crossplane.io
spec:
  group: conditionals.example.crossplane.io
  names:
    kind: NetworkingStack
    plural: networkingstacks
  scope: Namespaced
  versions:
  - name: v1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              region:
                type: string
              enablePublicSubnet:
                type: boolean
                description: Whether to create a public subnet
              enableSecurityGroup:
                type: boolean
                description: Whether to create a security group
          status:
            type: object
            properties:
              networkingInfo:
                type: object
                properties:
                  vpcID:
                    type: string
                  subnetID:
                    type: string
                  publicSubnetID:
                    type: string
                  securityGroupID:
                    type: string
